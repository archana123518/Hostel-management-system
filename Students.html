<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Menu</h2>

        <a href="index.html">🏠 Dashboard</a>
        <a href="Students.html" class="active">👨‍🎓 Students</a>
        <a href="rooms.html">🛏️ Rooms</a>
        <a href="mess.html">🍽️ Mess Bills</a>
        <a href="fees.html">💳 Fee Payments</a>
        <a href="reports.html">📊 Reports</a>
       <a href="#" class="logout-btn" onclick="logout()">🚪 Logout</a>
    </div>
    

    <!-- Main Content -->
    <div class="content">

        <h1>Student Management</h1>

        <div class="student-header">
            <button class="add-btn" onclick="showForm()">+ Add Student</button>

            <input
                class="search-box"
                type="text"
                id="searchInput"
                placeholder="Search Student..."
                onkeyup="searchStudent()">
        </div>
        

        <!-- Student Form -->
        <div id="studentForm" class="student-form" style="display:none;">

            <input type="text" id="id" placeholder="Student ID">

            <input type="text" id="name" placeholder="Student Name">

            <input type="text" id="department" placeholder="Department">

            <input type="text" id="room" placeholder="Room No">

            <input type="text" id="year" placeholder="Year">

            <select id="status">
                <option value="Paid">Paid</option>
                <option value="Pending">Pending</option>
            </select>

            
            <button onclick="saveStudent()">Save</button>
            <button onclick="cancelForm()">Cancel</button>

        </div>

        <!-- Student Table -->
        <table class="student-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Room No</th>
                    <th>Year</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="studentTableBody">

                <tr>
                    <td>101</td>
                    <td>Archana</td>
                    <td>ECE</td>
                    <td>A-101</td>
                    <td>IV</td>
                    <td>Paid</td>
                    <td>
                        <button onclick="editStudent(this)">Edit</button>
                        <button onclick="deleteStudent(this)">Delete</button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="Students.js"></script>

</body>
</html>
