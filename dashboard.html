<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Management & Mess Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Menu</h3>

        <a href="#">🏠 Dashboard</a>
        <a href="#">👨‍🎓 Students</a>
        <a href="#">🛏️ Rooms</a>
        <a href="#">🍽️ Mess Bills</a>
        <a href="#">💳 Fee Payments</a>
        <a href="#">📊 Reports</a>
        <a href="#" onclick="logout()" class="logout-menu">🚪 Logout</a>
    </div>

    <!-- Content -->
    <div class="content">

        <h1>Hostel Management & Mess Billing System</h1>

        <div class="dashboard">

            <div class="card">
                <h3>Total Students</h3>
                <h2 id="totalStudents">0</h2>
            </div>

            <div class="card">
                <h3>Occupied Rooms</h3>
                <h2 id="occupiedRooms">0</h2>
            </div>

            <div class="card">
                <h3>Vacant Rooms</h3>
                <h2 id="vacantRooms">100</h2>
            </div>

            <div class="card">
                <h3>Pending Payments</h3>
                <h2 id="pendingPayments">0</h2>
            </div>

        </div>

    </div>

 

<script src="script.js"></script>

</body>
</html>
