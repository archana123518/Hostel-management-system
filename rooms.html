<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Menu</h3>

        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="Students.html">👨‍🎓 Students</a>
        <a href="rooms.html" class="active">🛏️ Rooms</a>
        <a href="mess.html">🍽️ Mess Bills</a>
        <a href="fees.html">💳 Fee Payments</a>
        <a href="reports.html">📊 Reports</a>
    <a href="#" class="logout-btn" onclick="logout()">🚪 Logout</a>
    </div>

    <!-- Content -->
    <div class="content">

        <h1>Room Management</h1>

        <div class="student-header">

            <button class="add-btn" onclick="showRoomForm()">
                + Add Room
            </button>

            <input
                type="text"
                id="searchRoom"
                placeholder="Search Room..."
                onkeyup="searchRoom()">

        </div>

        <!-- Form -->

        <div id="roomForm" class="student-form" style="display:none;">

            <input type="text" id="roomNo" placeholder="Room Number">

            <input type="number" id="capacity" placeholder="Capacity">

            <select id="roomStatus">
                <option>Available</option>
                <option>Occupied</option>
            </select>

            <button onclick="saveRoom()">Save</button>
            <button onclick="cancelRoomForm()">Cancel</button>

        </div>

        <!-- Table -->

        <table class="student-table">

            <thead>

                <tr>
                    <th>Room No</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="roomTableBody">

                <tr>
                    <td>A-101</td>
                    <td>4</td>
                    <td>Occupied</td>

                    <td>

                        <button onclick="editRoom(this)">Edit</button>

                        <button onclick="deleteRoom(this)">Delete</button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="rooms.js"></script>

</body>
</html>
